name: LAB_EXAM

on:
  push:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: |
          python train.py

      - name: Generate Metrics
        run: |
          echo "### Model Metrics" >> $GITHUB_STEP_SUMMARY
          echo "K. Jayanth 2022BCS0020" >> $GITHUB_STEP_SUMMARY
          echo "batch1_2022BCS0020" >> $GITHUB_STEP_SUMMARY
          cat results/metrics.json >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/batch1_2022BCS0020:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/batch1_2022BCS0020:latest
